<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nexus | Payment Receipts</title>
    <meta name="description" content="View all your payment receipts for institutional clearance dues."/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy:         '#0A1628',
                        accent:       '#2563EB',
                        success:      '#16A34A',
                        slate:        '#F8FAFC',
                        border:       '#E2E8F0',
                        'text-main':  '#0F172A',
                        'text-muted': '#64748B',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { nexus: '6px', card: '8px' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
        .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="min-h-screen bg-slate">

<!-- ─── NAV ─────────────────────────────────────────────── -->
<header class="bg-white sticky top-0 z-40 shadow-[0_1px_10px_rgba(0,0,0,0.05)] border-b border-border">
    <div class="max-w-screen-lg mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <span class="text-navy text-xl font-extrabold tracking-tighter">Nexus</span>
            <a href="/dashboard" class="text-text-muted hover:text-navy text-xs font-semibold uppercase tracking-widest flex items-center gap-1.5 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
                </svg>
                Back to Dashboard
            </a>
        </div>
        <span id="nav-user" class="text-text-muted text-sm font-medium"></span>
    </div>
</header>

<!-- ─── PAGE CONTENT ─────────────────────────────────────── -->
<main class="max-w-screen-lg mx-auto px-6 py-10 space-y-6">

    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-extrabold text-navy tracking-tight">Payment Receipts</h1>
            <p class="text-text-muted text-sm mt-1">A read-only ledger of all your settled dues</p>
        </div>
        <span id="receipt-count" class="hidden text-[11px] font-bold uppercase tracking-widest text-text-muted bg-white border border-border px-3 py-1.5 rounded-nexus"></span>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-16 text-text-muted text-sm">Loading receipts…</div>

    <!-- Table Card -->
    <div id="table-card" class="hidden bg-white rounded-card border border-border overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-slate border-b border-border">
                        <th class="text-left px-6 py-3.5 text-[11px] font-bold uppercase tracking-widest text-text-muted">Transaction Ref</th>
                        <th class="text-left px-6 py-3.5 text-[11px] font-bold uppercase tracking-widest text-text-muted">Due Department</th>
                        <th class="text-left px-6 py-3.5 text-[11px] font-bold uppercase tracking-widest text-text-muted">Description</th>
                        <th class="text-left px-6 py-3.5 text-[11px] font-bold uppercase tracking-widest text-text-muted">Amount</th>
                        <th class="text-left px-6 py-3.5 text-[11px] font-bold uppercase tracking-widest text-text-muted">Paid At</th>
                    </tr>
                </thead>
                <tbody id="receipts-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden">
        <div class="bg-white rounded-card border border-border py-20 flex flex-col items-center gap-4 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
            <!-- Receipt icon -->
            <svg class="w-12 h-12 text-border" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 14l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
            <div class="text-center">
                <p class="text-text-muted font-semibold text-sm">No payments made yet</p>
                <p class="text-text-muted/60 text-xs mt-1">Once you settle a due, your receipt will appear here</p>
            </div>
        </div>
    </div>

</main>

<script>
// ─── Auth guard ─────────────────────────────────────────────────
const TOKEN = sessionStorage.getItem('nexus_token') || localStorage.getItem('nexus_token');
const USER  = JSON.parse(sessionStorage.getItem('nexus_user') || localStorage.getItem('nexus_user') || 'null');

if (TOKEN) { localStorage.setItem('nexus_token', TOKEN); sessionStorage.setItem('nexus_token', TOKEN); }
if (USER)  { localStorage.setItem('nexus_user', JSON.stringify(USER)); sessionStorage.setItem('nexus_user', JSON.stringify(USER)); }

if (!TOKEN || !USER) {
    window.location.href = '/';
}

document.getElementById('nav-user').textContent = USER?.name || '';

// ─── Helpers ────────────────────────────────────────────────────
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }

function formatDate(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' · '
        + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
}

// ─── Load Receipts ───────────────────────────────────────────────
async function loadReceipts() {
    try {
        const res  = await fetch('/payments/receipts', {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const data = await res.json();
        hide('loading');

        if (!res.ok) throw new Error(data.error);

        if (!data.length) {
            show('empty-state');
            return;
        }

        // Count badge
        const badge = document.getElementById('receipt-count');
        badge.textContent = `${data.length} receipt${data.length !== 1 ? 's' : ''}`;
        badge.classList.remove('hidden');

        // Render rows
        const tbody = document.getElementById('receipts-body');
        data.forEach((r, i) => {
            const row = document.createElement('tr');
            row.className = [
                i % 2 !== 0 ? 'bg-slate/70' : 'bg-white',
                i < data.length - 1 ? 'border-b border-border' : ''
            ].join(' ');

            row.innerHTML = `
                <td class="px-6 py-4">
                    <span class="mono text-[12px] text-text-muted tracking-tight bg-slate px-2.5 py-1 rounded-nexus border border-border">
                        ${r.transaction_ref}
                    </span>
                </td>
                <td class="px-6 py-4 text-text-main font-semibold">${r.department || '—'}</td>
                <td class="px-6 py-4 text-text-muted">${r.description || '—'}</td>
                <td class="px-6 py-4">
                    <span class="inline-flex items-center gap-1 bg-green-50 text-success text-xs font-bold px-3 py-1 rounded-full border border-green-200">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                        </svg>
                        ₹${r.amount}
                    </span>
                </td>
                <td class="px-6 py-4 text-text-muted text-[13px]">${formatDate(r.paid_at)}</td>
            `;
            tbody.appendChild(row);
        });

        show('table-card');

    } catch (err) {
        hide('loading');
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('loading').textContent = 'Failed to load receipts. Please refresh.';
        document.getElementById('loading').classList.add('text-red-500');
    }
}

loadReceipts();
</script>
</body>
</html>
