<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nexus | Approvals Dashboard</title>
    <meta name="description" content="Nexus Authority Dashboard — approve or flag student clearance applications."/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy:         '#0A1628',
                        accent:       '#2563EB',
                        success:      '#16A34A',
                        danger:       '#DC2626',
                        amber:        '#D97706',
                        slate:        '#F8FAFC',
                        border:       '#E2E8F0',
                        'text-main':  '#0F172A',
                        'text-muted': '#64748B',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    borderRadius: { nexus: '6px', card: '8px' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
        .sidebar-link.active { background: rgba(37,99,235,.1); color: #2563EB; }
        .sidebar-link:not(.active) { color: #64748B; }
        .sidebar-link:not(.active):hover { background: #F1F5F9; color: #0A1628; }
        .flag-zone { display: none; }
        .flag-zone.open { display: block; }
    </style>
</head>
<body class="bg-slate min-h-screen flex">

<!-- ════════════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════════════ -->
<aside class="w-[240px] min-h-screen bg-white border-r border-border flex flex-col shrink-0 sticky top-0 h-screen">

    <!-- Brand -->
    <div class="px-6 pt-8 pb-6 border-b border-border">
        <p class="text-navy text-xl font-extrabold tracking-tighter">Nexus</p>
        <p class="text-text-muted text-[9px] uppercase tracking-[0.25em] mt-0.5">Clearance Portal</p>
    </div>

    <!-- Authority identity -->
    <div class="px-6 py-5 border-b border-border">
        <p id="sidebar-name" class="text-navy text-sm font-semibold truncate">—</p>
        <p id="sidebar-role" class="text-text-muted text-[11px] uppercase tracking-widest mt-0.5">—</p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
        <button id="nav-pending" class="sidebar-link active w-full" onclick="switchTab('pending')">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span class="flex-1 text-left">Pending Requests</span>
            <span id="pending-badge" class="bg-accent text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
        <button id="nav-stale" class="sidebar-link w-full" onclick="switchTab('stale')">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="flex-1 text-left">Stale Requests</span>
        </button>
        <button id="nav-vault" class="sidebar-link w-full" onclick="switchTab('vault')">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span class="flex-1 text-left">Vault Verification</span>
            <span id="vault-badge" class="bg-amber-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
    </nav>

    <!-- Logout -->
    <div class="px-6 py-5 border-t border-border">
        <button onclick="logout()" class="text-text-muted hover:text-navy text-xs uppercase tracking-widest font-semibold flex items-center gap-2 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Sign Out
        </button>
    </div>
</aside>

<!-- ════════════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════════════ -->
<div class="flex-1 flex flex-col min-h-screen overflow-hidden">

    <!-- Top bar -->
    <header class="bg-white border-b border-border px-8 py-4 flex items-center justify-between shrink-0 shadow-[0_1px_10px_rgba(0,0,0,0.02)]">
        <div>
            <h1 id="main-title" class="text-lg font-extrabold text-navy tracking-tight">Pending Requests</h1>
            <p id="main-subtitle" class="text-text-muted text-xs mt-0.5">Applications awaiting your clearance decision</p>
        </div>
        <span id="main-count" class="text-[11px] font-bold uppercase tracking-widest text-text-muted bg-slate border border-border px-3 py-1.5 rounded-nexus"></span>
    </header>

    <!-- Content panels -->
    <main class="flex-1 overflow-y-auto px-8 py-7 space-y-5">

        <!-- Loading -->
        <div id="content-loading" class="text-center py-16 text-text-muted text-sm">Loading…</div>

        <!-- ── PENDING PANEL ─────────────────────────────────── -->
        <div id="panel-pending" class="hidden space-y-5"></div>

        <!-- ── VAULT PANEL ───────────────────────────────────── -->
        <div id="panel-vault" class="hidden space-y-6">
            <div id="vault-list" class="grid grid-cols-1 gap-6"></div>
        </div>

        <!-- ── STALE PANEL ──────────────────────────────────── -->
        <div id="panel-stale" class="hidden">
            <!-- Info note -->
            <div class="flex items-start gap-3 bg-blue-50 border border-blue-200 rounded-nexus px-4 py-3 mb-5">
                <svg class="w-4 h-4 text-accent mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <p class="text-accent text-xs font-semibold">Email nudges are sent automatically by the system for requests stale beyond 2 days.</p>
            </div>
            <div class="bg-white rounded-card border border-border overflow-hidden">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-slate border-b border-border">
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Student Name</th>
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Email</th>
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Stuck at Stage</th>
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Stale Since</th>
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Reminders</th>
                            <th class="text-left px-6 py-3 text-[11px] font-bold uppercase tracking-widest text-text-muted">Last Nudge</th>
                        </tr>
                    </thead>
                    <tbody id="stale-body"></tbody>
                </table>
                <div id="stale-empty" class="hidden py-12 text-center text-text-muted text-sm">No stale requests — pipeline is flowing.</div>
            </div>
        </div>

    </main>
</div>

<script>
// ─── Auth guard ─────────────────────────────────────────────────
const TOKEN = sessionStorage.getItem('nexus_token') || localStorage.getItem('nexus_token');
const USER  = JSON.parse(sessionStorage.getItem('nexus_user') || localStorage.getItem('nexus_user') || 'null');

if (TOKEN) { localStorage.setItem('nexus_token', TOKEN); sessionStorage.setItem('nexus_token', TOKEN); }
if (USER)  { localStorage.setItem('nexus_user', JSON.stringify(USER)); sessionStorage.setItem('nexus_user', JSON.stringify(USER)); }
const STAFF_ROLES = ['lab_incharge', 'hod', 'principal', 'librarian', 'accounts'];

if (!TOKEN || !USER || !STAFF_ROLES.includes(USER.role)) {
    window.location.href = '/';
}

// ─── Populate identity ───────────────────────────────────────────
const ROLE_LABELS = {
    lab_incharge: 'Lab Incharge',
    hod:          'HOD',
    principal:    'Principal',
    librarian:    'Librarian',
    accounts:     'Accounts',
};
document.getElementById('sidebar-name').textContent = USER?.name || '—';
document.getElementById('sidebar-role').textContent = ROLE_LABELS[USER?.role] || USER?.role;

function logout() {
    localStorage.removeItem('nexus_token');
    localStorage.removeItem('nexus_user');
    sessionStorage.removeItem('nexus_token');
    sessionStorage.removeItem('nexus_user');
    window.location.href = '/';
}

// ─── Helpers ────────────────────────────────────────────────────
const api = (url, opts = {}) =>
    fetch(url, { headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...opts.headers }, ...opts });

function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }

function fmtDate(s) {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' · '
        + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function daysSince(s) {
    if (!s) return '—';
    const diff = Date.now() - new Date(s).getTime();
    return Math.floor(diff / 86400000);
}

const STAGE_LABELS = { 
    librarian:    'Librarian',
    accounts:     'Accounts',
    lab_incharge: 'Lab Incharge', 
    hod:          'HOD', 
    principal:    'Principal' 
};

// ─── Tab switching ───────────────────────────────────────────────
let currentTab = 'pending';

function switchTab(tab) {
    currentTab = tab;

    document.getElementById('nav-pending').className  = 'sidebar-link w-full' + (tab === 'pending' ? ' active' : '');
    document.getElementById('nav-stale').className    = 'sidebar-link w-full' + (tab === 'stale'   ? ' active' : '');
    document.getElementById('nav-vault').className    = 'sidebar-link w-full' + (tab === 'vault'   ? ' active' : '');

    if (tab === 'pending') {
        document.getElementById('main-title').textContent    = 'Pending Requests';
        document.getElementById('main-subtitle').textContent = 'Applications awaiting your clearance decision';
        show('panel-pending'); hide('panel-stale'); hide('panel-vault');
        loadPending();
    } else if (tab === 'stale') {
        document.getElementById('main-title').textContent    = 'Stale Requests';
        document.getElementById('main-subtitle').textContent = 'Requests inactive for more than 2 days';
        show('panel-stale'); hide('panel-pending'); hide('panel-vault');
        loadStale();
    } else if (tab === 'vault') {
        document.getElementById('main-title').textContent    = 'Smart Vault Verification';
        document.getElementById('main-subtitle').textContent = 'Rapid side-by-side artifact verification';
        show('panel-vault'); hide('panel-pending'); hide('panel-stale');
        loadVault();
    }
}

// ─── Load Vault ─────────────────────────────────────────────────
async function loadVault() {
    const res = await api('/vault/pending');
    const data = await res.json();
    
    const container = document.getElementById('vault-list');
    container.innerHTML = '';
    
    document.getElementById('vault-badge').textContent = data.length;
    if (currentTab === 'vault') document.getElementById('main-count').textContent = `${data.length} document${data.length !== 1 ? 's' : ''}`;

    if (!data.length) {
        container.innerHTML = `
            <div class="bg-white rounded-card border border-border py-16 text-center">
                <p class="text-text-muted text-sm font-semibold">No documents pending verification</p>
            </div>`;
        return;
    }

    const ROLE_LABELS = { library_receipt: 'Library Receipt', lab_manual: 'Lab Manual', grade_card: 'Grade Card', id_card: 'ID Card', other: 'Other' };

    data.forEach(doc => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-card border border-border overflow-hidden flex flex-col md:flex-row h-[500px] shadow-sm';
        card.innerHTML = `
            <!-- Left: Document Preview (Side-by-side) -->
            <div class="flex-1 bg-slate border-r border-border relative overflow-hidden group">
                ${doc.file_type === 'application/pdf' 
                    ? `<iframe src="/${doc.file_path}" class="w-full h-full border-none"></iframe>`
                    : `<img src="/${doc.file_path}" class="w-full h-full object-contain" />`
                }
                <div class="absolute inset-x-0 top-0 bg-navy/80 text-white px-4 py-2 text-[10px] font-bold uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">
                    Previewing: ${doc.file_name}
                </div>
            </div>
            
            <!-- Right: Info & Actions -->
            <div class="w-full md:w-[320px] p-6 flex flex-col justify-between shrink-0">
                <div class="space-y-5">
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted mb-1">Student</p>
                        <p class="text-text-main font-bold text-base leading-tight">${doc.student_name}</p>
                        <p class="text-text-muted text-xs truncate">${doc.student_email}</p>
                    </div>
                    
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted mb-1">Artifact Type</p>
                        <span class="inline-block bg-accent/10 text-accent text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full border border-accent/20">
                            ${ROLE_LABELS[doc.document_role] || doc.document_role}
                        </span>
                    </div>

                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted mb-1">Uploaded On</p>
                        <p class="text-text-main text-xs font-medium">${fmtDate(doc.uploaded_at)}</p>
                    </div>
                </div>

                <div class="space-y-3 pt-6 border-t border-border">
                    <button onclick="verifyDocument(${doc.id}, 'rejected')" class="w-full bg-danger/10 text-danger border border-danger/20 py-2.5 rounded-nexus text-sm font-bold hover:bg-danger hover:text-white transition active:scale-95">
                        Reject Artifact
                    </button>
                    <button onclick="verifyDocument(${doc.id}, 'approved')" class="w-full bg-success text-white py-2.5 rounded-nexus text-sm font-bold hover:opacity-90 transition shadow-md active:scale-95">
                        Approve &amp; Verify
                    </button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

async function verifyDocument(id, status) {
    const res = await api(`/vault/verify/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
    if (res.ok) {
        loadVault();
    } else {
        const data = await res.json();
        alert(data.error || 'Verification failed');
    }
}

// ─── Load Pending ───────────────────────────────────────────────
async function loadPending() {
    hide('content-loading');
    const res  = await api('/approvals/dashboard');
    const data = await res.json();
    hide('content-loading');

    const panel = document.getElementById('panel-pending');
    panel.innerHTML = '';

    document.getElementById('pending-badge').textContent = data.length;
    document.getElementById('main-count').textContent    = `${data.length} request${data.length !== 1 ? 's' : ''}`;

    if (!data.length) {
        panel.innerHTML = `
            <div class="bg-white rounded-card border border-border py-16 text-center">
                <p class="text-text-muted text-sm font-semibold">No pending requests</p>
                <p class="text-text-muted/60 text-xs mt-1">Check back later or view stale requests in the sidebar</p>
            </div>`;
        show('panel-pending');
        return;
    }

    data.forEach(req => {
        const card = buildRequestCard(req);
        panel.appendChild(card);
    });

    show('panel-pending');
}

// ─── Build Request Card ─────────────────────────────────────────
function buildRequestCard(req) {
    const docRoles = { library_receipt: 'Library Receipt', lab_manual: 'Lab Manual', grade_card: 'Grade Card' };
    const docMap   = {};
    (req.documents || []).forEach(d => { docMap[d.document_role] = d; });

    const docsHtml = Object.entries(docRoles).map(([role, label]) => {
        const doc = docMap[role];
        return `
            <div class="flex items-center gap-3 py-1.5">
                <svg class="w-3.5 h-3.5 shrink-0 ${doc ? 'text-success' : 'text-text-muted/40'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-[12px] font-semibold text-text-muted w-28 shrink-0">${label}</span>
                ${doc
                    ? `<span class="text-[12px] text-text-muted truncate flex-1">${doc.file_name}</span>
                       <a href="/${doc.file_path}" target="_blank" rel="noopener" class="text-[11px] font-semibold text-accent hover:underline shrink-0">View</a>`
                    : `<span class="text-[12px] text-text-muted/50 italic flex-1">Not uploaded</span>`
                }
            </div>`;
    }).join('');

    const card = document.createElement('div');
    card.id = `card-${req.id}`;
    card.className = 'bg-white rounded-card border border-border p-6 space-y-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)]';
    card.innerHTML = `
        <!-- Student info -->
        <div class="flex items-start justify-between gap-4">
            <div>
                <p class="text-text-main font-bold text-base">${req.student_name}</p>
                <p class="text-text-muted text-sm">${req.student_email}</p>
            </div>
            <div class="text-right shrink-0">
                <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted">Submitted</p>
                <p class="text-[12px] text-text-muted mt-0.5">${fmtDate(req.submitted_at)}</p>
                ${(Date.now() - new Date(req.updated_at).getTime() > 120000) 
                    ? `<span class="inline-block mt-2 bg-red-100 text-red-600 text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded border border-red-200 animate-pulse">Delayed</span>` 
                    : ''}
            </div>
        </div>

        <!-- Documents -->
        <div class="bg-slate rounded-nexus px-4 py-2 space-y-0.5 border border-border">
            <p class="text-[10px] font-bold uppercase tracking-widest text-text-muted mb-2">Verification Artifacts</p>
            ${docsHtml}
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3 pt-1">
            <button onclick="toggleFlag(${req.id})"
                class="px-4 py-2 rounded-nexus text-sm font-semibold bg-danger text-white hover:opacity-90 transition active:scale-95">
                Flag
            </button>
            <button onclick="takeAction(${req.id}, 'approved')"
                class="px-5 py-2 rounded-nexus text-sm font-semibold bg-success text-white hover:opacity-90 transition active:scale-95">
                Approve
            </button>
        </div>

        <!-- Flag zone -->
        <div id="flag-zone-${req.id}" class="flag-zone border-t border-border pt-4 space-y-3">
            <label class="block text-[11px] font-bold uppercase tracking-wider text-text-muted">Comment for Student</label>
            <textarea id="flag-comment-${req.id}" rows="2"
                placeholder="Explain what is missing or incorrect…"
                class="block w-full px-3 py-2.5 bg-slate border border-border rounded-nexus text-text-main text-sm focus:ring-2 focus:ring-danger/20 focus:border-danger outline-none resize-none"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="toggleFlag(${req.id})" class="px-4 py-2 text-sm font-semibold text-text-muted border border-border rounded-nexus hover:bg-slate transition">Cancel</button>
                <button onclick="takeAction(${req.id}, 'flagged')" class="px-4 py-2 text-sm font-semibold bg-danger text-white rounded-nexus hover:opacity-90 transition">Confirm Flag</button>
            </div>
        </div>

        <!-- Result message -->
        <p id="card-msg-${req.id}" class="hidden text-xs font-semibold text-center pt-1"></p>
    `;
    return card;
}

function toggleFlag(reqId) {
    const zone = document.getElementById(`flag-zone-${reqId}`);
    zone.classList.toggle('open');
}

// ─── Take Action ────────────────────────────────────────────────
async function takeAction(reqId, action) {
    const comment = action === 'flagged'
        ? document.getElementById(`flag-comment-${reqId}`)?.value || ''
        : '';

    const res  = await api(`/approvals/${reqId}/action`, {
        method: 'PATCH',
        body: JSON.stringify({ action, comment })
    });
    const data = await res.json();

    const msg = document.getElementById(`card-msg-${reqId}`);
    if (!res.ok) {
        msg.textContent = data.error || 'Action failed';
        msg.className = 'text-xs font-semibold text-center pt-1 text-danger';
        msg.classList.remove('hidden');
        return;
    }

    // Fade out the card
    const card = document.getElementById(`card-${reqId}`);
    card.style.transition = 'opacity .4s, transform .4s';
    card.style.opacity = '0';
    card.style.transform = 'translateY(-6px)';
    setTimeout(() => { card.remove(); refreshPendingCount(); }, 450);
}

function refreshPendingCount() {
    const remaining = document.querySelectorAll('[id^="card-"]').length;
    document.getElementById('pending-badge').textContent = remaining;
    document.getElementById('main-count').textContent    = `${remaining} request${remaining !== 1 ? 's' : ''}`;
    if (remaining === 0) {
        document.getElementById('panel-pending').innerHTML = `
            <div class="bg-white rounded-card border border-border py-16 text-center">
                <p class="text-success font-semibold text-sm">All caught up — no pending requests.</p>
            </div>`;
    }
}

// ─── Load Stale ─────────────────────────────────────────────────
async function loadStale() {
    const tbody = document.getElementById('stale-body');
    tbody.innerHTML = '';
    hide('stale-empty');

    const res  = await api('/approvals/stale');
    const data = await res.json();

    if (!data.length) {
        show('stale-empty');
        document.getElementById('main-count').textContent = '0 requests';
        return;
    }

    document.getElementById('main-count').textContent = `${data.length} request${data.length !== 1 ? 's' : ''}`;

    data.forEach((r, i) => {
        const diffMs = Date.now() - new Date(r.updated_at).getTime();
        const mins = Math.floor(diffMs / 60000);
        const days = Math.floor(diffMs / 86400000);
        const staleText = days > 0 ? `${days} day${days!==1?'s':''}` : `${mins} min${mins!==1?'s':''}`;

        const row  = document.createElement('tr');
        row.className = i % 2 !== 0 ? 'bg-slate/70 border-b border-border' : 'bg-white border-b border-border';
        row.innerHTML = `
            <td class="px-6 py-3.5 text-text-main font-semibold">${r.student_name}</td>
            <td class="px-6 py-3.5 text-text-muted text-[13px]">${r.student_email}</td>
            <td class="px-6 py-3.5">
                <span class="inline-block bg-amber-50 text-amber-700 text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full border border-amber-200">
                    ${STAGE_LABELS[r.current_stage] || r.current_stage}
                </span>
            </td>
            <td class="px-6 py-3.5">
                <span class="text-danger font-bold text-sm">${staleText}</span>
            </td>
            <td class="px-6 py-3.5 font-bold text-text-main">${r.reminder_count || 0}</td>
            <td class="px-6 py-3.5 text-text-muted text-xs">${fmtDate(r.last_reminder_sent_at) || '—'}</td>`;
        tbody.appendChild(row);
    });
}

// ─── Init ───────────────────────────────────────────────────────
loadPending();
loadVault(); // Initialize badge count
</script>
</body>
</html>
